                  </div>
              )}

              <div className="absolute inset-0 pointer-events-none overflow-visible z-30"> 
                {effects.map((effect) => ( <div key={effect.id} className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl font-black ${effect.color} animate-float-up`} style={{ textShadow: '2px 2px 0px white' }}>{effect.text}</div> ))} 
              </div> 
              <div className="flex items-center justify-between mb-2"> 
                <span className={`text-xs font-bold px-2 py-0.5 rounded-lg ${rank.bg} ${rank.color} flex items-center gap-1 transition-colors duration-300`}><span>{rank.icon}</span> {rank.title}</span> 
                <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity"> 
                  <button onClick={(e) => { e.stopPropagation(); onEdit(student); }} className="text-slate-300 hover:text-blue-400 p-1 transition-colors" title={t.editStudent}><Pencil size={14} /></button> 
                  <button onClick={(e) => { e.stopPropagation(); onDelete(student.id); }} className="text-slate-300 hover:text-red-400 p-1 transition-colors" title={t.confirmDelete}><Trash2 size={14} /></button> 
                </div> 
              </div>
              <div className="flex flex-col items-center mb-2 relative cursor-pointer" onClick={() => onView(student)}> 
                <div className={`text-5xl mb-1 filter drop-shadow-sm select-none transform transition-transform duration-200 ${animClass} ${!animClass && 'group-hover:scale-110'}`}>{student.avatar}</div> 
                <h2 className="text-lg font-bold text-slate-800 hover:text-orange-500 transition-colors leading-tight truncate w-full text-center">{student.name}</h2> 
              </div> 
              <div className="bg-slate-50 rounded-lg px-3 py-1.5 mb-2 flex justify-between items-center shadow-inner relative overflow-hidden"> 
                <div className="absolute left-0 bottom-0 top-0 bg-orange-100 opacity-30 transition-all duration-500" style={{ width: `${Math.min(student.points * 2, 100)}%` }} /> 
                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider z-10">Pts</span> 
                <span className="text-xl font-black text-orange-500 font-mono z-10 transition-all duration-300 transform leading-none">{student.points}</span> 
              </div> 
              <div className="grid grid-cols-2 gap-2 mt-auto"> 
                <button onClick={() => triggerEffect(-1)} className="flex items-center justify-center gap-1 py-1.5 bg-red-50 text-red-500 rounded-lg hover:bg-red-100 transition-colors font-bold active:scale-95 text-sm"><Minus size={14} /> {t.deduct}</button> 
                <button onClick={() => triggerEffect(1)} className="flex items-center justify-center gap-1 py-1.5 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 transition-colors font-bold shadow-sm active:scale-95 active:shadow-none text-sm"><Plus size={14} /> {t.add}</button> 
              </div> 
            </div> 
          ); 
        };

        const ToolAttendance = ({ students, attendanceRecord, setAttendanceRecord, currentWeek, setCurrentWeek, t }) => {
            
            // 取得當前週的資料，若無則為空物件
            const currentWeekData = attendanceRecord[currentWeek] || {};

            const handleStatusChange = (id, status) => {
                setAttendanceRecord(prev => {
                    const weekData = prev[currentWeek] || {};
                    const studentData = weekData[id] || { status: 'present', uniform: true };
                    return { ...prev, [currentWeek]: { ...weekData, [id]: { ...studentData, status } } };
                });
            };

            const handleUniformToggle = (id) => {
                setAttendanceRecord(prev => {
                    const weekData = prev[currentWeek] || {};
                    const studentData = weekData[id] || { status: 'present', uniform: true };
                    return { ...prev, [currentWeek]: { ...weekData, [id]: { ...studentData, uniform: !studentData.uniform } } };
                });
            };

            const resetCurrentWeek = () => {
                setAttendanceRecord(prev => {
                    const newData = { ...prev };
                    delete newData[currentWeek];
                    return newData;
                });
            };

            const stats = {
                present: students.filter(s => (currentWeekData[s.id]?.status || 'present') === 'present').length,
                absent: students.filter(s => currentWeekData[s.id]?.status === 'absent').length,
                late: students.filter(s => currentWeekData[s.id]?.status === 'late').length,
                leaveEarly: students.filter(s => currentWeekData[s.id]?.status === 'leave_early').length,
                excused: students.filter(s => currentWeekData[s.id]?.status === 'excused').length,
                noUniform: students.filter(s => currentWeekData[s.id]?.uniform === false && currentWeekData[s.id]?.status !== 'absent' && currentWeekData[s.id]?.status !== 'excused').length,
            };

            const exportToCSV = () => {
                // 建立 CSV 標題列 (加入統計欄位)
                let csvContent = "Student Name(學生姓名),Total Present(總出席),Total Absent(總缺席),Total Late(總遲到),Total Leave Early(總早退),Total Excused(總請假),Total No Uniform(總未穿制服),";
                for (let i = 1; i <= 32; i++) {
                    csvContent += `W${i} Status(出勤),W${i} Uniform(制服)${i === 32 ? '' : ','}`;
                }
                csvContent += "\n";

                // 填入每位學生的 32 週資料與統計
                students.forEach(student => {
                    let row = `"${student.name}",`;
                    let counts = { present: 0, absent: 0, late: 0, leave_early: 0, excused: 0, noUniform: 0 };
                    let weeklyData = "";

                    for (let i = 1; i <= 32; i++) {
                        // 💡 修正邏輯：判斷該週是否有紀錄，或者是否小於等於「當前選擇的週數」
                        const hasWeekRecord = attendanceRecord[i] !== undefined;
                        const isPastOrCurrentWeek = i <= currentWeek || hasWeekRecord;

                        if (!isPastOrCurrentWeek) {
                            // 如果是未來的週數且沒有提早紀錄，不計入統計，顯示為未記錄 "-"
                            weeklyData += `"-","-"${i === 32 ? '' : ','}`;
                            continue;
                        }

                        const record = attendanceRecord[i]?.[student.id] || { status: 'present', uniform: true };
                        
                        // 統計各狀態總次數
                        counts[record.status] = (counts[record.status] || 0) + 1;
                        // 若未穿制服，且非缺席、非請假，則計入未穿制服次數
                        if (!record.uniform && record.status !== 'absent' && record.status !== 'excused') {
                            counts.noUniform += 1;
                        }

                        // 翻譯狀態
                        let statusText = '';
                        if (record.status === 'present') statusText = t.statusPresent;
                        else if (record.status === 'absent') statusText = t.statusAbsent;
                        else if (record.status === 'late') statusText = t.statusLate;
                        else if (record.status === 'leave_early') statusText = t.statusLeaveEarly;
                        else if (record.status === 'excused') statusText = t.statusExcused;

                        let uniformText = record.uniform ? t.statusUniformYes : t.statusUniformNo;

                        weeklyData += `"${statusText}","${uniformText}"${i === 32 ? '' : ','}`;
                    }
                    
                    // 將統計數據與每週明細組合
                    row += `"${counts.present}","${counts.absent}","${counts.late}","${counts.leave_early}","${counts.excused}","${counts.noUniform}",` + weeklyData;
                    csvContent += row + "\n";
                });

                // 加上 BOM (\uFEFF) 確保 Excel 開啟時中文不會亂碼
                const bom = "\uFEFF";
                const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `Attendance_Record.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="flex flex-col h-full w-full">
                    <div className="flex flex-col md:flex-row items-center justify-between gap-4 mb-6 p-4 bg-teal-50 rounded-xl relative">
                        {/* 32週 選擇器 */}
                        <div className="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-teal-100">
                            <span className="font-bold text-teal-800">🗓️</span>
                            <select 
                                value={currentWeek} 
                                onChange={(e) => setCurrentWeek(Number(e.target.value))}
                                className="text-lg font-black text-teal-700 bg-transparent focus:outline-none cursor-pointer"
                            >
                                {Array.from({ length: 32 }, (_, i) => (
                                    <option key={i + 1} value={i + 1}>{t.weekLabel.replace('{n}', i + 1)}</option>
                                ))}
                            </select>
                        </div>

                        {/* 統計面板 */}
                        <div className="flex flex-wrap justify-center gap-3 md:gap-6">
                            <div className="text-center"><div className="text-2xl font-black text-teal-600">{stats.present}</div><div className="text-[10px] font-bold text-teal-800">{t.statusPresent}</div></div>
                            <div className="text-center"><div className="text-2xl font-black text-red-500">{stats.absent}</div><div className="text-[10px] font-bold text-red-800">{t.statusAbsent}</div></div>
                            <div className="text-center"><div className="text-2xl font-black text-yellow-600">{stats.late}</div><div className="text-[10px] font-bold text-yellow-800">{t.statusLate}</div></div>
                            <div className="text-center"><div className="text-2xl font-black text-orange-500">{stats.leaveEarly}</div><div className="text-[10px] font-bold text-orange-800">{t.statusLeaveEarly}</div></div>
                            <div className="text-center"><div className="text-2xl font-black text-slate-500">{stats.excused}</div><div className="text-[10px] font-bold text-slate-700">{t.statusExcused}</div></div>
                            <div className="text-center"><div className="text-2xl font-black text-indigo-500">{stats.noUniform}</div><div className="text-[10px] font-bold text-indigo-800">{t.noUniformBadge}</div></div>
                        </div>

                        <div className="absolute top-2 right-2 flex gap-2">
                            <button onClick={exportToCSV} className="px-2 py-1 bg-white border border-slate-200 rounded-lg text-xs font-bold text-teal-600 hover:bg-slate-50 shadow-sm flex items-center gap-1">
                                <Download size={12} /> {t.exportCSV}
                            </button>
                            <button onClick={resetCurrentWeek} className="px-2 py-1 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-500 hover:bg-slate-50 shadow-sm">
                                {t.resetAttendance}
                            </button>
                        </div>
                    </div>

                    {/* 學生列表區 */}
                    <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                        {students.map(s => {
                            const studentData = currentWeekData[s.id] || { status: 'present', uniform: true };
                            const { status, uniform } = studentData;
                            
                            return (
                                <div key={s.id} className={`flex flex-col xl:flex-row justify-between items-center bg-white p-3 rounded-xl border transition-all gap-3 ${status === 'absent' ? 'border-red-200 bg-red-50/30' : (status === 'late' ? 'border-yellow-200 bg-yellow-50/30' : (status === 'leave_early' ? 'border-orange-200 bg-orange-50/30' : 'border-slate-200 shadow-sm'))}`}>
                                    <div className="flex items-center gap-3 w-full xl:w-auto">
                                        <div className="text-3xl filter drop-shadow-sm">{s.avatar}</div>
                                        <div className="font-bold text-slate-700 text-lg truncate w-32">{s.name}</div>
                                    </div>
                                    
                                    <div className="flex flex-wrap items-center gap-2 w-full xl:w-auto">
                                        {/* 出缺勤狀態按鈕組 */}
                                        <div className="flex bg-slate-100 p-1 rounded-lg">
                                            <button onClick={() => handleStatusChange(s.id, 'present')} className={`px-2 py-1.5 rounded-md text-xs font-bold transition-all ${status === 'present' ? 'bg-white text-teal-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{t.statusPresent}</button>
                                            <button onClick={() => handleStatusChange(s.id, 'absent')} className={`px-2 py-1.5 rounded-md text-xs font-bold transition-all ${status === 'absent' ? 'bg-white text-red-500 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{t.statusAbsent}</button>
                                            <button onClick={() => handleStatusChange(s.id, 'late')} className={`px-2 py-1.5 rounded-md text-xs font-bold transition-all ${status === 'late' ? 'bg-white text-yellow-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{t.statusLate}</button>
                                            <button onClick={() => handleStatusChange(s.id, 'leave_early')} className={`px-2 py-1.5 rounded-md text-xs font-bold transition-all ${status === 'leave_early' ? 'bg-white text-orange-500 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{t.statusLeaveEarly}</button>
                                            <button onClick={() => handleStatusChange(s.id, 'excused')} className={`px-2 py-1.5 rounded-md text-xs font-bold transition-all ${status === 'excused' ? 'bg-white text-slate-500 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>{t.statusExcused}</button>
                                        </div>

                                        {/* 制服切換按鈕 (若缺席或請假則自動隱藏/禁用較合理，這裡保留顯示供調整) */}
                                        <button 
                                            onClick={() => handleStatusChange(s.id, status) /* Ensure record exists */ || handleUniformToggle(s.id)} 
                                            disabled={status === 'absent' || status === 'excused'}
                                            className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${status === 'absent' || status === 'excused' ? 'opacity-30 cursor-not-allowed border-slate-200 bg-slate-50 text-slate-400' : (uniform ? 'bg-indigo-50 border-indigo-200 text-indigo-600 hover:bg-indigo-100' : 'bg-red-50 border-red-200 text-red-500 hover:bg-red-100')}`}
                                        >
                                            <Shirt size={14} /> {uniform ? t.statusUniformYes : t.statusUniformNo}
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ToolPicker = ({ students, isMuted, t, onClose }) => {
            const [currentStudent, setCurrentStudent] = useState(null);
            const [isRolling, setIsRolling] = useState(false);
            const [history, setHistory] = useState([]);
            const rollInterval = useRef(null);
            const toggleRoll = useCallback(() => {
                if (!students.length) return;
                if (isRolling) {
                    clearInterval(rollInterval.current);
                    setIsRolling(false);
                    const winner = students[Math.floor(Math.random() * students.length)];
                    setCurrentStudent(winner);
                    setHistory(prev => [winner, ...prev]);
                    playGameSound('victory', isMuted);
                } else {
                    setIsRolling(true);
                    playGameSound('roll', isMuted);
                    rollInterval.current = setInterval(() => {
                        const randomStudent = students[Math.floor(Math.random() * students.length)];
                        setCurrentStudent(randomStudent);
                    }, 50);
                }
            }, [students, isRolling, isMuted]);
            useEffect(() => {
                const handleKeyDown = (e) => { if (e.code === 'Space') { e.preventDefault(); toggleRoll(); } };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [toggleRoll]);
            return (
                <div className="flex flex-col items-center justify-center h-full w-full">
                    <div className={`relative w-full max-w-md aspect-video bg-white rounded-3xl shadow-xl border-4 ${isRolling ? 'border-orange-400' : 'border-indigo-100'} flex flex-col items-center justify-center mb-8 overflow-hidden transition-colors duration-300`}>
                        {currentStudent ? (
                            <div className="text-center animate-in zoom-in duration-300">
                                <div className={`text-9xl mb-4 ${isRolling ? 'animate-bounce' : 'animate-pop'}`}>{currentStudent.avatar}</div>
                                <div className={`text-4xl font-black ${isRolling ? 'text-slate-400' : 'text-indigo-600'}`}>{currentStudent.name}</div>
                            </div>
                        ) : ( <div className="text-slate-300 font-bold text-3xl">READY?</div> )}
                        {!isRolling && currentStudent && <div className="absolute top-0 left-0 w-full h-full pointer-events-none bg-yellow-400/10 animate-pulse"></div>}
                    </div>
                    <button onClick={toggleRoll} className={`px-12 py-4 rounded-full text-2xl font-black text-white shadow-lg transform transition-all active:scale-95 ${isRolling ? 'bg-red-500 hover:bg-red-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>{isRolling ? t.stopRoll : t.startRoll}</button>
                    {history.length > 0 && (
                        <div className="mt-8 flex gap-2 overflow-x-auto max-w-full p-2 bg-slate-50/50 rounded-xl">
                            {history.map((s, i) => (
                                <div key={i} className="flex items-center gap-1 bg-white px-3 py-1 rounded-full shadow-sm text-sm font-bold text-slate-600 border border-slate-100 whitespace-nowrap"><span>{s.avatar}</span> {s.name}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ToolWheel = ({ students, isMuted, t }) => {
            const canvasRef = useRef(null);
            const [isSpinning, setIsSpinning] = useState(false);
            const [winner, setWinner] = useState(null);
            const currentRotation = useRef(0);
            const colors = ['#FF9AA2', '#FFB7B2', '#FFDAC1', '#E2F0CB', '#B5EAD7', '#C7CEEA', '#90dbf4', '#f1c0e8'];
            const [mode, setMode] = useState('students');
            const [customText, setCustomText] = useState('');

            const items = useMemo(() => {
                if (mode === 'students') {
                    return students;
                } else {
                    const lines = customText.split('\n').filter(line => line.trim() !== '');
                    if (lines.length === 0) return []; 
                    return lines.map((text, i) => ({
                        id: `custom-${i}`,
                        name: text.trim(),
                        avatar: ['✨', '🎁', '🎯', '⭐', '🎈'][i % 5] 
                    }));
                }
            }, [mode, students, customText]);

            const drawWheel = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const n = items.length;
                
                ctx.clearRect(0, 0, 500, 500);
                
                if (n === 0) {
                    ctx.beginPath();
                    ctx.arc(250, 250, 220, 0, 2 * Math.PI);
                    ctx.fillStyle = '#f1f5f9';
                    ctx.fill();
                    ctx.strokeStyle = '#cbd5e1';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    return;
                }

                const arcSize = (2 * Math.PI) / n;
                const radius = 220;
                const centerX = 250;
                const centerY = 250;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(currentRotation.current);
                ctx.translate(-centerX, -centerY);
                for (let i = 0; i < n; i++) {
                    const angle = i * arcSize;
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, angle, angle + arcSize);
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fill();
                    ctx.strokeStyle = "white";
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle + arcSize / 2);
                    ctx.textAlign = "right";
                    ctx.fillStyle = "#333";
                    ctx.font = "bold 24px sans-serif";
                    const text = items[i].name.length > 8 ? items[i].name.substring(0, 8) + '...' : items[i].name;
                    const label = `${items[i].avatar} ${text}`;
                    ctx.fillText(label, radius - 20, 10);
                    ctx.restore();
                }
                ctx.restore();
                ctx.beginPath();
                ctx.arc(centerX, centerY, 20, 0, 2 * Math.PI);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX + 210, centerY);
                ctx.lineTo(centerX + 240, centerY - 15);
                ctx.lineTo(centerX + 240, centerY + 15);
                ctx.fillStyle = "#ef4444";
                ctx.fill();
            }, [items]);

            useEffect(() => { drawWheel(); }, [drawWheel]);

            const spin = () => {
                if (isSpinning || items.length < 2) return;
                setIsSpinning(true);
                setWinner(null);
                const duration = 4000;
                const startRotation = currentRotation.current;
                const totalRotation = (5 * 2 * Math.PI) + (Math.random() * 2 * Math.PI);
                const startTime = performance.now();
                const animate = (time) => {
                    const elapsed = time - startTime;
                    if (elapsed < duration) {
                        const progress = elapsed / duration;
                        const easeOut = 1 - Math.pow(1 - progress, 3);
                        currentRotation.current = startRotation + (totalRotation * easeOut);
                        drawWheel();
                        requestAnimationFrame(animate);
                    } else {
                        currentRotation.current = startRotation + totalRotation;
                        drawWheel();
                        setIsSpinning(false);
                        const n = items.length;
                        const normalizedRotation = currentRotation.current % (2 * Math.PI);
                        const arcSize = (2 * Math.PI) / n;
                        let winningIndex = Math.floor(((2 * Math.PI - normalizedRotation) % (2 * Math.PI)) / arcSize);
                        const winItem = items[winningIndex];
                        setWinner(winItem);
                        playGameSound('victory', isMuted);
                    }
                };
                requestAnimationFrame(animate);
            };

            return (
                <div className="flex flex-col md:flex-row h-full gap-4 items-center justify-center">
                    <div className="flex flex-col items-center">
                        <div className="relative w-[300px] h-[300px] md:w-[450px] md:h-[450px] mb-6">
                             <div className="absolute top-1/2 right-[-20px] transform -translate-y-1/2 z-20 text-red-500 drop-shadow-md"><svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor"><path d="M3 12l18-12v24z"/></svg></div>
                             <canvas ref={canvasRef} width="500" height="500" className="w-full h-full rounded-full shadow-2xl border-4 border-white" />
                        </div>
                        {winner && (
                            <div className="absolute inset-0 flex items-center justify-center bg-black/50 rounded-3xl z-30 animate-in fade-in">
                                <div className="bg-white p-6 rounded-2xl text-center shadow-2xl transform scale-110">
                                    <div className="text-6xl mb-2 animate-bounce">{winner.avatar}</div>
                                    <h3 className="text-3xl font-black text-indigo-600 mb-2">{winner.name}</h3>
                                    <p className="text-slate-400 font-bold">{t.congrats}</p>
                                    <button onClick={() => setWinner(null)} className="mt-4 px-6 py-2 bg-indigo-100 text-indigo-600 rounded-lg font-bold hover:bg-indigo-200">{t.pickAgain}</button>
                                </div>
                            </div>
                        )}
                        <button onClick={spin} disabled={isSpinning || items.length < 2} className="px-10 py-3 rounded-full bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black text-xl shadow-lg hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:scale-100">{isSpinning ? t.spinning : t.spin}</button>
                    </div>

                    <div className="w-full md:w-64 flex flex-col bg-slate-50 p-4 rounded-xl border border-slate-200 h-full max-h-[500px]">
                        <div className="flex bg-white rounded-lg p-1 shadow-sm border border-slate-200 mb-4">
                            <button onClick={() => setMode('students')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${mode === 'students' ? 'bg-pink-100 text-pink-600' : 'text-slate-500 hover:bg-slate-50'}`}><User size={16} className="inline mr-1"/> {t.wheelModeStudents}</button>
                            <button onClick={() => setMode('custom')} className={`flex-1 py-2 text-sm font-bold rounded-md transition-colors ${mode === 'custom' ? 'bg-pink-100 text-pink-600' : 'text-slate-500 hover:bg-slate-50'}`}><List size={16} className="inline mr-1"/> {t.wheelModeCustom}</button>
                        </div>
                        {mode === 'custom' && (
                            <div className="flex-1 flex flex-col">
                                <textarea value={customText} onChange={(e) => setCustomText(e.target.value)} placeholder={t.wheelCustomPlaceholder} className="w-full flex-1 p-3 border border-slate-300 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-pink-400 bg-white" />

        const ToolSeating = ({ students, t }) => {
            const [positions, setPositions] = useState(() => {
                const saved = localStorage.getItem('chineseClassSeating');
                return saved ? JSON.parse(saved) : {};
            });
            const [draggingId, setDraggingId] = useState(null);
            const containerRef = useRef(null);

            useEffect(() => {
                if (Object.keys(positions).length === 0 && students.length > 0) {
                    autoGrid();
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('chineseClassSeating', JSON.stringify(positions));
            }, [positions]);

            const handleMouseDown = (e, id) => { setDraggingId(id); };

            const handleMouseMove = (e) => {
                if (!draggingId || !containerRef.current) return;
                const rect = containerRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const x = ((clientX - rect.left) / rect.width) * 100;
                const y = ((clientY - rect.top) / rect.height) * 100;
                const clampedX = Math.max(0, Math.min(95, x));
                const clampedY = Math.max(0, Math.min(90, y));
                setPositions(prev => ({ ...prev, [draggingId]: { x: clampedX, y: clampedY } }));
            };

            const handleMouseUp = () => { setDraggingId(null); };

            const autoGrid = () => {
                const newPos = {};
                const cols = Math.ceil(Math.sqrt(students.length));
                students.forEach((s, i) => {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    newPos[s.id] = { x: 5 + col * 12, y: 5 + row * 15 };
                });
                setPositions(newPos);
            };

            const autoGroups = () => {
                const newPos = {};
                const groupCount = 4;
                const shuffled = [...students].sort(() => Math.random() - 0.5);
                shuffled.forEach((s, i) => {
                    const groupIndex = i % groupCount;
                    const itemInGroup = Math.floor(i / groupCount);
                    const cx = (groupIndex % 2) * 50 + 25; 
                    const cy = Math.floor(groupIndex / 2) * 45 + 25;
                    const offsetX = (itemInGroup % 3) * 10 - 10; 
                    const offsetY = Math.floor(itemInGroup / 3) * 10 - 5;
                    newPos[s.id] = { x: Math.max(0, Math.min(90, cx + offsetX)), y: Math.max(0, Math.min(90, cy + offsetY)) };
                });
                setPositions(newPos);
            };

            return (
                <div className="flex flex-col h-full w-full">
                    <div className="flex justify-center gap-2 mb-4">
                        <button onClick={autoGrid} className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-indigo-100"><LayoutGrid size={14}/> {t.seatAutoGrid}</button>
                        <button onClick={autoGroups} className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-indigo-100"><Users size={14}/> {t.seatAutoGroup}</button>
                        <button onClick={() => setPositions({})} className="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-sm font-bold flex items-center gap-1 hover:bg-slate-200"><RotateCcw size={14}/> {t.seatReset}</button>
                    </div>
                    <div className="text-center text-xs text-slate-400 mb-2">{t.seatDragTip}</div>
                    <div 
                        ref={containerRef}
                        className="flex-1 relative bg-slate-100 border-2 border-dashed border-slate-300 rounded-xl overflow-hidden shadow-inner w-full min-h-[400px]"
                        onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp} onTouchMove={handleMouseMove} onTouchEnd={handleMouseUp}
                    >
                        {students.map(s => {
                            const pos = positions[s.id] || { x: 50, y: 50 }; 
                            return (
                                <div
                                    key={s.id}
                                    className="absolute flex flex-col items-center justify-center p-1 cursor-grab active:cursor-grabbing hover:scale-110 transition-transform"
                                    style={{ left: `${pos.x}%`, top: `${pos.y}%`, touchAction: 'none' }}
                                    onMouseDown={(e) => handleMouseDown(e, s.id)} onTouchStart={(e) => handleMouseDown(e, s.id)}
                                >
                                    <div className="text-3xl bg-white rounded-full p-1 shadow-md border border-slate-200 select-none">{s.avatar}</div>
                                    <div className="text-xs font-bold bg-white/80 px-1 rounded text-slate-700 mt-1 shadow-sm whitespace-nowrap select-none">{s.name}</div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const ToolNoise = ({ t }) => {
            const [isListening, setIsListening] = useState(false);
            const [volume, setVolume] = useState(0);
            const [threshold] = useState({ low: 60, high: 80 }); 
            const [sensitivity, setSensitivity] = useState(1.5); 
            const [loudSeconds, setLoudSeconds] = useState(0);
            const [totalSeconds, setTotalSeconds] = useState(0);
            
            const volumeRef = useRef(0);
            const sensitivityRef = useRef(sensitivity);
            
            const audioContextRef = useRef(null);
            const analyserRef = useRef(null);
            const sourceRef = useRef(null);
            const rafRef = useRef(null);

            useEffect(() => { sensitivityRef.current = sensitivity; }, [sensitivity]);

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60);
                const s = secs % 60;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            };

            const startListening = async () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    alert("您的瀏覽器不支援音訊輸入，無法使用聲控儀。請確認您使用 https 連線。");
                    return;
                }
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContextRef.current = new AudioContext();
                    
                    // 強制喚醒 AudioContext
                    if (audioContextRef.current.state === 'suspended') {
                        await audioContextRef.current.resume();
                    }

                    analyserRef.current = audioContextRef.current.createAnalyser();
                    sourceRef.current = audioContextRef.current.createMediaStreamSource(stream);
                    analyserRef.current.fftSize = 256;
                    analyserRef.current.smoothingTimeConstant = 0.5;
                    sourceRef.current.connect(analyserRef.current);
                    setIsListening(true);
                    updateVolume();
                } catch (err) {
                    console.warn('Microphone permission issue:', err); 
                    alert(t.noisePermissionDenied);
                }
            };

            const stopListening = () => {
                if (rafRef.current) cancelAnimationFrame(rafRef.current);
                if (sourceRef.current) {
                    if (sourceRef.current.mediaStream) {
                        sourceRef.current.mediaStream.getTracks().forEach(track => track.stop());
                    }
                    sourceRef.current.disconnect();
                }
                if (audioContextRef.current) { audioContextRef.current.close(); }
                setIsListening(false);
                setVolume(0);
                volumeRef.current = 0;
            };

            const updateVolume = () => {
                if (!analyserRef.current) return;
                const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
                analyserRef.current.getByteFrequencyData(dataArray);
                
                let peak = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    if (dataArray[i] > peak) peak = dataArray[i];
                }
                
                const scaled = Math.min(100, (peak / 255) * 100 * sensitivityRef.current);
                setVolume(scaled);
                volumeRef.current = scaled;
                rafRef.current = requestAnimationFrame(updateVolume);
            };

            useEffect(() => {
                let interval = null;
                if (isListening) {
                    interval = setInterval(() => {
                        setTotalSeconds(s => s + 1);
                        if (volumeRef.current > threshold.high) {
                            setLoudSeconds(s => s + 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isListening, threshold]);

            useEffect(() => { return () => stopListening(); }, []);

            const getZoneColor = () => {
                if (volume > threshold.high) return 'bg-red-500 shadow-red-200';
                if (volume > threshold.low) return 'bg-yellow-400 shadow-yellow-200';
                return 'bg-emerald-400 shadow-emerald-200';
            };

            const getZoneText = () => {
                if (volume > threshold.high) return t.noiseZoneRed;
                if (volume > threshold.low) return t.noiseZoneYellow;
                return t.noiseZoneGreen;
            };

            return (
                <div className="flex flex-col items-center w-full h-full p-4">
                    <div className="flex-1 flex flex-col justify-end w-full max-w-xs bg-slate-100 rounded-3xl relative overflow-hidden shadow-inner border-4 border-slate-200 mb-6">
                        <div className="absolute top-[20%] left-0 w-full border-t-2 border-dashed border-red-300 opacity-50 z-10"><span className="absolute right-2 -top-3 text-xs text-red-400 font-bold">MAX</span></div>
                        <div className="absolute top-[40%] left-0 w-full border-t-2 border-dashed border-yellow-300 opacity-50 z-10"><span className="absolute right-2 -top-3 text-xs text-yellow-400 font-bold">WARN</span></div>
                        <div className={`w-full transition-all duration-100 ease-linear ${getZoneColor()} shadow-[0_0_20px_rgba(0,0,0,0.2)]`} style={{ height: `${Math.max(5, volume)}%` }} ></div>
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none"> <span className={`text-4xl font-black drop-shadow-md ${volume > threshold.high ? 'text-white animate-pulse' : 'text-slate-500/50'}`}> {getZoneText()} </span> </div>
                    </div>
                    <div className="grid grid-cols-2 gap-4 w-full max-w-md mb-6">
                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 text-center">
                            <div className="text-xs text-slate-400 font-bold uppercase mb-1">{t.noiseTimeTotal}</div>
                            <div className="text-2xl font-mono font-bold text-slate-700">{formatTime(totalSeconds)}</div>
                        </div>
                        <div className={`p-3 rounded-xl border text-center transition-colors ${loudSeconds > 0 ? 'bg-red-50 border-red-200' : 'bg-slate-50 border-slate-200'}`}>
                            <div className="text-xs text-red-400 font-bold uppercase mb-1">{t.noiseTimeLoud}</div>
                            <div className="text-2xl font-mono font-bold text-red-600">{formatTime(loudSeconds)}</div>
                        </div>
                    </div>
                    <div className="flex flex-col items-center gap-4 w-full max-w-md">
                        <div className="flex items-center gap-2 w-full">
                            <span className="text-xs font-bold text-slate-400 whitespace-nowrap">{t.noiseSensitivity}</span>
                            <input type="range" min="0.5" max="3" step="0.1" value={sensitivity} onChange={(e) => setSensitivity(parseFloat(e.target.value))} className="w-full accent-indigo-500 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer" />
                        </div>
                        {!isListening ? ( <button onClick={startListening} className="flex items-center gap-2 px-8 py-3 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95" > <Mic size={20} /> {t.noiseStart} </button> ) : ( <button onClick={stopListening} className="flex items-center gap-2 px-8 py-3 bg-slate-100 text-slate-600 rounded-full font-bold hover:bg-slate-200 transition-all" > <MicOff size={20} /> {t.noiseStop} </button> )}
                    </div>
                </div>
            );
        };

        const TimerWidget = ({ isMuted, t, onClose }) => {
            const [mode, setMode] = useState('timer');
            const [timeLeft, setTimeLeft] = useState(60); 
            const [elapsedTime, setElapsedTime] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [initialTime, setInitialTime] = useState(60);
            const [customMinutes, setCustomMinutes] = useState('');

            useEffect(() => {
                let interval = null;
                if (isActive) {
                    interval = setInterval(() => {
                        if (mode === 'timer') {
                            setTimeLeft(time => {
                                if (time <= 1) {
                                    clearInterval(interval);
                                    setIsActive(false);
                                    playGameSound('alarm', isMuted);
                                    return 0;
                                }
                                return time - 1;
                            });
                        } else {
                            setElapsedTime(time => time + 1);
                        }
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, mode, isMuted]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const setTime = (sec) => { 
                setIsActive(false); 
                setInitialTime(sec); 
                setTimeLeft(sec); 
            };

            const handleCustomSubmit = (e) => {
                e.preventDefault();
                const mins = parseInt(customMinutes);
                if (!isNaN(mins) && mins > 0) {
                    setTime(mins * 60);
                    setCustomMinutes('');
                }
            };

            return (
                <div className="fixed bottom-4 right-4 z-[70] bg-white rounded-2xl shadow-2xl border border-slate-200 p-4 w-64 animate-in slide-in-from-bottom-10 fade-in">
                    <div className="flex justify-between items-center mb-2">
                        <div className="flex bg-slate-100 rounded-lg p-0.5">
                            <button onClick={() => {setMode('timer'); setIsActive(false);}} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${mode === 'timer' ? 'bg-white text-orange-500 shadow-sm' : 'text-slate-400'}`} > {t.timerModeCountDown} </button>
                            <button onClick={() => {setMode('stopwatch'); setIsActive(false);}} className={`px-3 py-1 rounded-md text-xs font-bold transition-all ${mode === 'stopwatch' ? 'bg-white text-blue-500 shadow-sm' : 'text-slate-400'}`} > {t.timerModeStopwatch} </button>
                        </div>
                        <button onClick={onClose} className="text-slate-300 hover:text-slate-500 ml-2"><X size={16}/></button>
                    </div>
                    <div className={`text-5xl font-mono font-black text-center mb-2 ${mode === 'timer' && timeLeft <= 10 && isActive ? 'text-red-500 animate-pulse' : 'text-slate-700'}`}>
                        {formatTime(mode === 'timer' ? timeLeft : elapsedTime)}
                    </div>
                    {mode === 'timer' && (
                        <>
                            <div className="grid grid-cols-4 gap-1 mb-2">
                                {[60, 180, 300, 600].map(s => ( <button key={s} onClick={() => setTime(s)} className="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 py-1 rounded font-bold">{Math.floor(s/60)}m</button> ))}
                            </div>
                            <form onSubmit={handleCustomSubmit} className="flex gap-1 mb-4">
                                <input type="number" min="1" max="999" value={customMinutes} onChange={(e) => setCustomMinutes(e.target.value)} placeholder={t.timerCustom} className="flex-1 px-2 py-1 text-xs border border-slate-200 rounded-lg focus:outline-none focus:border-orange-400" />
                                <button type="submit" className="px-3 py-1 bg-orange-100 text-orange-600 text-xs font-bold rounded-lg hover:bg-orange-200">{t.timerSet}</button>
                            </form>
                        </>
                    )}
                    <div className="flex gap-2 mt-2">
                        <button onClick={() => setIsActive(!isActive)} className={`flex-1 py-2 rounded-lg font-bold text-white flex items-center justify-center gap-1 ${isActive ? 'bg-yellow-500 hover:bg-yellow-600' : (mode === 'timer' ? 'bg-orange-500 hover:bg-orange-600' : 'bg-blue-500 hover:bg-blue-600')}`} >
                            {isActive ? <><StopCircle size={16}/> {t.timerPause}</> : <><Play size={16}/> {t.timerStart}</>}
                        </button>
                        <button onClick={() => { setIsActive(false); mode === 'timer' ? setTimeLeft(initialTime) : setElapsedTime(0); }} className="px-3 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200" >
                            <RotateCcw size={18} />
                        </button>
                    </div>
                </div>
            );
        };

        function App() {

          const [showRain, setShowRain] = useState(false); 
          const [showThunder, setShowThunder] = useState(false);
          const [showSun, setShowSun] = useState(false); 
          const [shakeScreen, setShakeScreen] = useState(false); 
          const [lang, setLang] = useState('zh-TW'); 
          const [wakeLock, setWakeLock] = useState(null);
          
          const [activeTool, setActiveTool] = useState(null);

          const [showAttentionMenu, setShowAttentionMenu] = useState(false);

          const [currentWeek, setCurrentWeek] = useState(() => {

          const [confirmAction, setConfirmAction] = useState(null);

              setShowCelebration(true);

          const toggleWakeLock = async () => {
