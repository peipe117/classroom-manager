              try {
                  if (wakeLock === null) {
                      const lock = await navigator.wakeLock.request('screen');
                      setWakeLock(lock);
                  } else {
                      await wakeLock.release();
                      setWakeLock(null);
                  }
              } catch (err) {
                  if (err.name === 'NotAllowedError') {
                      const msg = lang === 'en' ? 'Wake Lock not allowed by browser policy.' : '無法啟用螢幕常亮：瀏覽器權限限制。';
                      alert(msg);
                  } else {
                      console.error(err);
                      alert('Wake Lock failed');
                  }
                  setWakeLock(null);
              }
          };

          const toggleLanguage = () => {
            if (lang === 'zh-TW') setLang('zh-CN');
            else if (lang === 'zh-CN') setLang('en');
            else setLang('zh-TW');
          };

          const getLangIcon = () => {
            if (lang === 'zh-TW') return '繁';
            if (lang === 'zh-CN') return '简';
            return 'EN';
          };

          const saveTitle = () => { setCustomTitle(tempTitle); setIsEditingTitle(false); playGameSound('success', isMuted); };
          const saveSubtitle = () => { setCustomSubtitle(tempSubtitle); setIsEditingSubtitle(false); playGameSound('success', isMuted); };

          const triggerAttention = (type) => {
              setShowAttentionMenu(false);
              setAttentionEffect(type);
              playGameSound(type, isMuted);
          };

          const handleAddStudent = (e) => { e.preventDefault(); if (!newName.trim()) return; const newStudent = { id: Date.now(), name: newName, avatar: selectedAvatar, points: 0 }; setStudents([...students, newStudent]); setNewName(''); setShowAddForm(false); playGameSound('success', isMuted); };
          const handleBatchImport = (e) => { e.preventDefault(); if (!batchNames.trim()) return; const names = batchNames.split(/[\n,，]+/).map(n => n.trim()).filter(n => n); if (names.length === 0) return; const newStudents = names.map((name, index) => ({ id: Date.now() + index, name: name, avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)].icon, points: 0 })); setStudents(prev => [...prev, ...newStudents]); setBatchNames(''); setShowAddForm(false); setIsBatchMode(false); playGameSound('success', isMuted); };
          const handleDeleteStudent = (id) => { setConfirmAction({ message: t.confirmDelete, action: () => { setStudents(prev => prev.filter(s => s.id !== id)); setConfirmAction(null); } }); };
          const updatePoints = (id, delta) => { setStudents(students.map(student => { if (student.id === id) { return { ...student, points: Math.max(0, student.points + delta) }; } return student; })); };
          const handleGroupAddPoints = (groupMembers) => { const ids = groupMembers.map(m => m.id); setStudents(prev => prev.map(s => { if (ids.includes(s.id)) { return { ...s, points: s.points + 1 }; } return s; })); playGameSound('success', isMuted); setShowRain(true); setTimeout(() => { setShowRain(false); setShowSun(true); setTimeout(() => setShowSun(false), 2000); }, 2000); };
          const updateClassManualPoints = (delta) => { if (delta > 0) { playGameSound('success', isMuted); setShowRain(true); playGameSound('rain', isMuted); setTimeout(() => { setShowRain(false); setShowSun(true); setTimeout(() => setShowSun(false), 3000); }, 4000); } else { setShowThunder(true); playGameSound('wind', isMuted); setTimeout(() => { setShakeScreen(true); playGameSound('thunder', isMuted); }, 1200); setTimeout(() => { setShowThunder(false); setShakeScreen(false); }, 3500); } setClassManualPoints(prev => Math.max(0, prev + delta)); };
          const handleUpdateStudent = (updatedStudent) => { setStudents(students.map(s => s.id === updatedStudent.id ? updatedStudent : s)); setEditingStudent(null); };
          const resetAllPoints = () => { setConfirmAction({ message: t.confirmReset, action: () => { setStudents(prev => prev.map(s => ({ ...s, points: 0 }))); setClassManualPoints(0); setConfirmAction(null); } }); };
          const saveGoal = () => { const val = parseInt(tempGoal); if (val > 0) { setClassGoal(val); setIsEditingGoal(false); playGameSound('success', isMuted); } };
          const saveReward = () => { if (tempReward.trim()) { setRewardName(tempReward); setIsEditingReward(false); playGameSound('success', isMuted); } };

          // --- Animations & Styles ---
          const styles = `
            @keyframes bell-swing { 0% { transform: rotate(0); } 25% { transform: rotate(15deg); } 50% { transform: rotate(0); } 75% { transform: rotate(-15deg); } 100% { transform: rotate(0); } }
            .animate-bell-swing { animation: bell-swing 0.5s ease-in-out infinite; }
            @keyframes ufo-hover { 0% { transform: translateY(0) rotate(0); } 25% { transform: translateY(-20px) rotate(-5deg); } 75% { transform: translateY(20px) rotate(5deg); } 100% { transform: translateY(0) rotate(0); } }
            .animate-ufo-hover { animation: ufo-hover 2s ease-in-out infinite; }
            @keyframes beam-pulse { 0% { opacity: 0.3; height: 0; } 50% { opacity: 0.8; height: 300px; } 100% { opacity: 0.3; height: 300px; } }
            .animate-beam { animation: beam-pulse 0.5s forwards; }
            @keyframes rooster-crow { 0% { transform: scale(1); } 50% { transform: scale(1.2) translateY(-20px); } 100% { transform: scale(1); } }
            .animate-rooster-crow { animation: rooster-crow 0.5s infinite; }
            @keyframes float-up { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 20% { transform: translate(-50%, -100%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -250%); opacity: 0; } }
            .animate-float-up { animation: float-up 0.8s ease-out forwards; }
            @keyframes bounce-happy { 0%, 100% { transform: translateY(0) scale(1); } 25% { transform: translateY(-15px) scale(1.3) rotate(-10deg); } 50% { transform: translateY(0) scale(1.1) rotate(10deg); } 75% { transform: translateY(-5px) scale(1.05) rotate(-5deg); } }
            .animate-bounce-happy { animation: bounce-happy 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
            @keyframes shake-sad { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-6px) rotate(-6deg); } 40% { transform: translateX(6px) rotate(6deg); } 60% { transform: translateX(-3px) rotate(-3deg); } 80% { transform: translateX(3px) rotate(3deg); } }
            .animate-shake-sad { animation: shake-sad 0.5s ease-in-out; }
            @keyframes shake-screen { 0%, 100% { transform: translateX(0); } 10% { transform: translateX(-15px) rotate(-2deg); } 30% { transform: translateX(15px) rotate(2deg); } 50% { transform: translateX(-15px); } 70% { transform: translateX(15px); } }
            .animate-shake-screen { animation: shake-screen 0.5s ease-in-out; }
            @keyframes confetti-fall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
            .animate-confetti-fall { animation: confetti-fall 4s linear forwards; }
            @keyframes rain-fall { 0% { transform: translateY(0); } 100% { transform: translateY(100vh); } }
            .animate-rain-fall { animation: rain-fall linear infinite; }
            @keyframes storm-fall { 0% { transform: translateY(0) translateX(0); } 100% { transform: translateY(120vh) translateX(-20vh); } }
            .animate-storm-fall { animation: storm-fall linear infinite; }
            @keyframes darken-sky { from { opacity: 0; } to { opacity: 1; } }
            .animate-darken-sky { animation: darken-sky 0.8s ease-out forwards; }
            @keyframes cloud-move-right { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 0.8; } }
            .animate-cloud-move-right { animation: cloud-move-right 1s ease-out forwards; }
            @keyframes cloud-move-left { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 0.8; } }
            .animate-cloud-move-left { animation: cloud-move-left 1s ease-out forwards; }
            @keyframes tornado-enter { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 100% { transform: scale(1) rotate(720deg); opacity: 0.9; } }
            .animate-tornado-enter { animation: tornado-enter 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
            @keyframes lightning-flash-triple { 0% { background-color: rgba(255,255,255,0); } 10% { background-color: rgba(255,255,255,0.8); } 20% { background-color: rgba(255,255,255,0.1); } 40% { background-color: rgba(255,255,255,0.9); } 60% { background-color: rgba(255,255,255,0.2); } 70% { background-color: rgba(255,255,255,0.6); } 100% { background-color: rgba(255,255,255,0); } }
            .animate-lightning-flash-triple { animation: lightning-flash-triple 1.2s ease-out 1.2s forwards; }
            @keyframes strike-triple { 0% { opacity: 0; transform: scale(0.8); } 10% { opacity: 1; transform: scale(1); } 20% { opacity: 0; } 40% { opacity: 1; transform: scale(1.2); } 50% { opacity: 0; } 70% { opacity: 1; transform: scale(0.9); } 80% { opacity: 0; } 100% { opacity: 0; } }
            .animate-strike-triple { animation: strike-triple 1.2s linear 1.2s forwards; }
            @keyframes flash-random { 0%, 100% { opacity: 0; } 50% { opacity: 0.6; } }
            .animate-flash-background-1 { animation: flash-random 0.3s linear 1.3s forwards; }
            .animate-flash-background-2 { animation: flash-random 0.4s linear 1.6s forwards; }
            .animate-flash-background-3 { animation: flash-random 0.2s linear 1.9s forwards; }
            @keyframes bounce-in { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); opacity: 1; } 70% { transform: scale(0.9); } 100% { transform: scale(1); } }
            .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.215, 0.610, 0.355, 1.000) both; }
            @keyframes fly-right { 0% { transform: translateX(0) translateY(0); } 25% { transform: translateX(30vw) translateY(-20px); } 50% { transform: translateX(60vw) translateY(10px); } 75% { transform: translateX(120vw) translateY(-10px); } 100% { transform: translateX(180vw) translateY(0); } }
            .animate-fly-right { animation: fly-right 4s linear forwards; }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            .animate-spin-slow { animation: spin-slow 10s linear infinite; }
          `;

          return (
            <div className={`min-h-screen bg-orange-50 font-sans text-slate-800 p-4 md:p-8 overflow-hidden ${shakeScreen ? 'animate-shake-screen' : ''} flex flex-col`}>
              <style>{styles}</style>
              
              {showRain && <Rain />}
              {showThunder && <Thunder />}
              {showSun && <SunAndBirds isMuted={isMuted} />}

              {/* Floating Timer */}
              {showTimer && <TimerWidget isMuted={isMuted} t={t} onClose={() => setShowTimer(false)} />}

              {/* Attention Effects Overlay */}
              {attentionEffect && <AttentionOverlay type={attentionEffect} onClose={() => setAttentionEffect(null)} />}

              {/* Custom Confirmation Modal */}
              {confirmAction && (
                <div className="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 text-center transform scale-100 transition-transform">
                        <div className="mx-auto bg-orange-100 w-12 h-12 rounded-full flex items-center justify-center mb-4"><AlertTriangle className="text-orange-600" size={24} /></div>
                        <h3 className="text-lg font-bold text-slate-800 mb-6">{confirmAction.message}</h3>
                        <div className="flex gap-3 justify-center">
                            <button onClick={() => setConfirmAction(null)} className="px-6 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold hover:bg-slate-200 transition-colors">{t.cancel}</button>
                            <button onClick={confirmAction.action} className="px-6 py-2.5 bg-red-500 text-white rounded-xl font-bold hover:bg-red-600 shadow-md transition-colors">{t.confirm}</button>
                        </div>
                    </div>
                </div>
              )}

              {/* Student Details Modal (View Points) */}
              {viewingStudent && (
                  <StudentDetailModal student={viewingStudent} onClose={() => setViewingStudent(null)} lang={lang} />
              )}

              {/* Tool Modal (Picker/Wheel/Groups/Seating/Noise/Attendance) */}
              {activeTool && (
                  <div className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                      <div className="bg-white w-full max-w-4xl h-[80vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden relative">
                          <div className="p-4 bg-indigo-50 border-b border-indigo-100 flex justify-between items-center">
                              <h2 className="text-xl font-black text-indigo-700 flex items-center gap-2">
                                  {activeTool === 'picker' && <><Dices/> {t.toolPicker}</>}
                                  {activeTool === 'wheel' && <><Disc/> {t.toolWheel}</>}
                                  {activeTool === 'groups' && <><Users/> {t.toolGroups}</>}
                                  {activeTool === 'seating' && <><Armchair/> {t.toolSeating}</>}
                                  {activeTool === 'attendance' && <><ClipboardList/> {t.toolAttendance}</>}
                                  {activeTool === 'noise' && <><Mic/> {t.toolNoise}</>}
                              </h2>
                              <button onClick={() => setActiveTool(null)} className="p-2 hover:bg-white rounded-full text-slate-500 transition-colors"><X/></button>
                          </div>
                          <div className="flex-1 overflow-auto p-6 bg-slate-50 relative">
                              {activeTool === 'picker' && <ToolPicker students={students} isMuted={isMuted} t={t} onClose={() => setActiveTool(null)} />}
                              {activeTool === 'wheel' && <ToolWheel students={students} isMuted={isMuted} t={t} />}
                              {activeTool === 'groups' && <ToolGroups students={students} t={t} onAddPoints={handleGroupAddPoints} />}
                              {activeTool === 'seating' && <ToolSeating students={students} t={t} />}
                              {activeTool === 'attendance' && <ToolAttendance students={students} attendanceRecord={attendanceRecord} setAttendanceRecord={setAttendanceRecord} currentWeek={currentWeek} setCurrentWeek={setCurrentWeek} t={t} />}
                              {activeTool === 'noise' && <ToolNoise t={t} />}
                          </div>
                      </div>
                  </div>
              )}

              {/* Celebration Overlay */}
              {showCelebration && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-in fade-in duration-300">
                  <Confetti />
                  <div className="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-lg mx-4 transform animate-bounce-in relative overflow-hidden border-4 border-yellow-400">
                     <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-500 via-yellow-500 to-blue-500"></div>
                     <PartyPopper size={64} className="mx-auto text-yellow-500 mb-4 animate-bounce" />
                     <h2 className="text-4xl font-black text-orange-600 mb-4">🎉 {t.celebrationTitle} 🎉</h2>
                     <p className="text-xl text-slate-600 mb-6 font-bold">{t.celebrationBody}</p>
                     <div className="mb-8">
                        <p className="text-sm text-slate-400 mb-2 uppercase tracking-wider font-bold">{t.rewardLabel}</p>
                        <div className="text-3xl font-black text-pink-600 border-2 border-pink-200 bg-pink-50 p-6 rounded-2xl shadow-sm rotate-1">{rewardName}</div>
                     </div>
                     <button onClick={() => setShowCelebration(false)} className="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white py-4 rounded-xl font-bold text-xl hover:from-orange-600 hover:to-red-600 shadow-lg transform transition hover:scale-105">{t.celebrationBtn}</button>
                  </div>
                </div>
              )}

              {editingStudent && <EditModal student={editingStudent} onClose={() => setEditingStudent(null)} onSave={handleUpdateStudent} lang={lang} />}

              <header className="max-w-6xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center gap-4 relative z-20 w-full">
                <div className="flex flex-col gap-2 w-full md:w-auto">
                  <div className="flex items-center gap-2">
                     <span className="text-4xl">🏫</span> 
                     {isEditingTitle ? (
                         <div className="flex items-center gap-1 animate-in fade-in zoom-in w-full">
                            <input type="text" value={tempTitle} onChange={(e) => setTempTitle(e.target.value)} className="p-1 border-2 border-orange-300 rounded-lg text-2xl md:text-3xl font-bold text-orange-600 focus:outline-none focus:border-orange-500 w-full md:w-auto" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveTitle()} />
                            <button onClick={saveTitle} className="p-1 bg-green-100 text-green-600 rounded-lg hover:bg-green-200"><Check size={24} /></button>
                            <button onClick={() => setIsEditingTitle(false)} className="p-1 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200"><X size={24} /></button>
                         </div>
                     ) : (
                         <h1 className="text-3xl md:text-4xl font-bold text-orange-600 flex items-center gap-2 cursor-pointer group border-b-2 border-transparent hover:border-orange-200 transition-all" onClick={() => { setTempTitle(customTitle || t.defaultTitle); setIsEditingTitle(true); }}>
                            {customTitle || t.defaultTitle}
                            <Pencil size={20} className="text-orange-300 opacity-0 group-hover:opacity-100 transition-opacity" />
                         </h1>
                     )}
                  </div>
                  
                  <div className="text-slate-500 mt-1 flex items-center gap-2 flex-wrap">
                    {isEditingSubtitle ? (
                         <div className="flex items-center gap-1 animate-in fade-in zoom-in w-full md:w-auto">
                            <input type="text" value={tempSubtitle} onChange={(e) => setTempSubtitle(e.target.value)} className="p-1 border-2 border-slate-300 rounded-lg text-base text-slate-600 focus:outline-none focus:border-orange-400 w-full md:min-w-[300px]" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveSubtitle()} />
                            <button onClick={saveSubtitle} className="p-1 bg-green-100 text-green-600 rounded-lg hover:bg-green-200"><Check size={18} /></button>
                            <button onClick={() => setIsEditingSubtitle(false)} className="p-1 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200"><X size={18} /></button>
                         </div>
                    ) : (
                        <p className="flex items-center gap-2 cursor-pointer group border-b border-transparent hover:border-slate-300 transition-all" onClick={() => { setTempSubtitle(customSubtitle || t.defaultSubtitle); setIsEditingSubtitle(true); }}>
                            {customSubtitle || t.defaultSubtitle}
                            <Pencil size={14} className="text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />
                        </p>
                    )}
                  </div>
                </div>
                
                <div className="flex gap-2 items-center flex-wrap justify-center mt-4 md:mt-0">
                    <div className="flex bg-white rounded-full p-1 border border-slate-200 shadow-sm mr-2 relative">
                        <button onClick={() => setActiveTool('picker')} className="p-2 text-indigo-500 hover:bg-indigo-50 rounded-full transition-colors" title={t.toolPicker}><Dices size={20}/></button>
                        <button onClick={() => setActiveTool('wheel')} className="p-2 text-pink-500 hover:bg-pink-50 rounded-full transition-colors" title={t.toolWheel}><Disc size={20}/></button>
                        <button onClick={() => setActiveTool('groups')} className="p-2 text-blue-500 hover:bg-blue-50 rounded-full transition-colors" title={t.toolGroups}><Users size={20}/></button>
                        <button onClick={() => setActiveTool('seating')} className="p-2 text-emerald-500 hover:bg-emerald-50 rounded-full transition-colors" title={t.toolSeating}><Armchair size={20}/></button>
                        <button onClick={() => setActiveTool('attendance')} className="p-2 text-teal-500 hover:bg-teal-50 rounded-full transition-colors" title={t.toolAttendance}><ClipboardList size={20}/></button>
                        <button onClick={() => setActiveTool('noise')} className="p-2 text-rose-500 hover:bg-rose-50 rounded-full transition-colors" title={t.toolNoise}><Mic size={20}/></button>
                        <button onClick={() => setShowTimer(!showTimer)} className="p-2 text-orange-500 hover:bg-orange-50 rounded-full transition-colors" title={t.toolTimer}><Timer size={20}/></button>
                        
                        <div className="relative">
                            <button onClick={() => setShowAttentionMenu(!showAttentionMenu)} className="p-2 text-red-500 hover:bg-red-50 rounded-full transition-colors" title={t.toolAttention}><Bell size={20}/></button>
                            {showAttentionMenu && (
                                <>
                                    <div className="fixed inset-0 z-40" onClick={() => setShowAttentionMenu(false)}></div>
                                    <div className="absolute top-12 right-0 bg-white rounded-xl shadow-xl border border-slate-100 p-2 z-50 w-40 flex flex-col gap-1 animate-in zoom-in-95 duration-200 origin-top-right">
                                        <button onClick={() => triggerAttention('school-bell')} className="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 rounded-lg text-slate-700 font-bold text-sm text-left"><Bell size={16} className="text-indigo-500"/> {t.attnBell}</button>
                                        <button onClick={() => triggerAttention('rooster')} className="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 rounded-lg text-slate-700 font-bold text-sm text-left"><Sunrise size={16} className="text-orange-500"/> {t.attnRooster}</button>
                                        <button onClick={() => triggerAttention('ufo')} className="flex items-center gap-2 px-3 py-2 hover:bg-slate-50 rounded-lg text-slate-700 font-bold text-sm text-left"><Rocket size={16} className="text-green-500"/> {t.attnUFO}</button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    <button onClick={toggleWakeLock} className={`p-2 rounded-full transition-colors mr-2 ${wakeLock ? 'bg-yellow-100 text-yellow-600' : 'bg-slate-100 text-slate-400'}`} title={wakeLock ? t.wakeLockOn : t.wakeLockOff}><MonitorPlay size={20} /></button>
                    <button onClick={toggleLanguage} className="flex items-center gap-1 px-3 py-2 bg-blue-50 text-blue-600 rounded-full hover:bg-blue-100 transition-colors font-bold mr-2" title="Switch Language"><Globe size={18} /> {getLangIcon()}</button>
                    <button onClick={() => setIsMuted(!isMuted)} className={`p-3 rounded-full transition-colors mr-2 ${isMuted ? 'bg-slate-200 text-slate-500' : 'bg-orange-100 text-orange-600'}`} title={isMuted ? t.unmute : t.mute}>{isMuted ? <VolumeX size={20} /> : <Volume2 size={20} />}</button>
                    <button onClick={resetAllPoints} className="flex items-center gap-2 px-4 py-2 bg-white border-2 border-slate-200 text-slate-600 rounded-full hover:bg-slate-50 transition-colors shadow-sm font-bold"><RotateCcw size={18} /> {t.reset}</button>
                    <button onClick={() => setShowAddForm(!showAddForm)} className="flex items-center gap-2 px-6 py-2 bg-orange-500 text-white rounded-full hover:bg-orange-600 transition-colors shadow-lg font-bold"><UserPlus size={20} /> {t.addStudent}</button>
                </div>
              </header>

              {/* Goal Dashboard */}
              <div className="max-w-6xl mx-auto mb-16 bg-white p-6 rounded-2xl shadow-lg border-b-4 border-orange-200 relative z-10 w-full">
                <div className="flex flex-col md:flex-row justify-between items-end mb-4 gap-4">
                  <div>
                    <div className="flex flex-col mb-2">
                        <div className="flex items-center gap-2 mb-1">
                            <Users className="text-orange-500" />
                            <span className="font-bold text-lg text-slate-700">{t.totalEnergy}</span>
                        </div>
                        <div className="flex gap-2 text-xs text-slate-500 flex-wrap">
                            <span className="bg-orange-100 text-orange-700 px-2 py-1 rounded-lg font-bold">👨‍🎓 {t.studentCount}{students.length}{t.studentCountUnit}</span>
                            <span className="bg-slate-100 px-2 py-1 rounded-lg">⚡ {t.fromStudents}：{totalStudentPoints}</span>
                            <span className="bg-slate-100 px-2 py-1 rounded-lg">🏫 {t.fromClass}：{classManualPoints}</span>
                        </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <div className="flex items-center bg-orange-50 rounded-lg p-1 border border-orange-100">
                          <button onClick={() => updateClassManualPoints(-1)} className="p-2 text-red-400 hover:bg-red-100 hover:text-red-500 rounded-md transition-colors" title={t.classDeduct}><Minus size={18} strokeWidth={3} /></button>
                          <span className="mx-2 font-bold text-slate-400 text-sm">Class</span>
                          <button onClick={() => updateClassManualPoints(1)} className="p-2 text-green-500 hover:bg-green-100 hover:text-green-600 rounded-md transition-colors" title={t.classAdd}><Plus size={18} strokeWidth={3} /></button>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-4xl font-black text-orange-600">{totalPoints}</span>
                        <span className="text-slate-400 text-2xl">/</span>
                        {isEditingGoal ? (
                          <div className="flex items-center gap-1 animate-in fade-in zoom-in duration-200">
                            <input type="number" value={tempGoal} onChange={(e) => setTempGoal(e.target.value)} className="w-20 p-1 border-2 border-orange-300 rounded-lg text-xl font-bold text-slate-700 focus:outline-none focus:border-orange-500" autoFocus onKeyDown={(e) => e.key === 'Enter' && saveGoal()} />
                            <button onClick={saveGoal} className="p-1 bg-green-100 text-green-600 rounded-lg hover:bg-green-200"><Check size={20} /></button>
                            <button onClick={() => setIsEditingGoal(false)} className="p-1 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200"><X size={20} /></button>
                          </div>
                        ) : (
                          <div className="flex items-center gap-2 cursor-pointer group" onClick={() => { setTempGoal(classGoal); setIsEditingGoal(true); }}>
                            <span className="text-3xl font-black text-slate-400 group-hover:text-orange-400 transition-colors border-b-2 border-dashed border-slate-300 group-hover:border-orange-300">{classGoal}</span>
                            <span className="p-1.5 bg-slate-100 text-slate-400 rounded-full group-hover:bg-orange-100 group-hover:text-orange-500 transition-colors"><Settings size={14} /></span>
                          </div>
                        )}
                        <span className="text-xl font-bold text-orange-600 ml-1">{t.points}</span>
                      </div>
                    </div>
                  </div>
                  <div className="w-full md:w-auto flex flex-col items-end">
                     <div className="flex items-center gap-2 mb-1">
                        <Gift size={16} className="text-pink-500" />
                        <span className="font-bold text-sm text-slate-500">{t.currentReward}</span>
                         {isEditingReward ? (
                            <div className="flex items-center gap-1 animate-in fade-in zoom-in">
                                <input type="text" value={tempReward} onChange={(e) => setTempReward(e.target.value)} className="w-40 p-1 border-2 border-pink-300 rounded-lg text-sm font-bold text-slate-700 focus:outline-none focus:border-pink-500" autoFocus placeholder={t.enterReward} onKeyDown={(e) => e.key === 'Enter' && saveReward()} />
                                <button onClick={saveReward} className="p-1 bg-green-100 text-green-600 rounded-lg hover:bg-green-200"><Check size={16} /></button>
                                <button onClick={() => setIsEditingReward(false)} className="p-1 bg-slate-100 text-slate-500 rounded-lg hover:bg-slate-200"><X size={16} /></button>
                            </div>
                         ) : (
                            <div className="flex items-center gap-2 cursor-pointer group hover:bg-slate-50 px-2 py-1 rounded-lg transition-colors" onClick={() => { setTempReward(rewardName); setIsEditingReward(true); }}>
                                <span className="text-pink-600 font-bold text-lg border-b-2 border-dashed border-transparent group-hover:border-pink-300 transition-all">{rewardName}</span>
                                <Pencil size={14} className="text-slate-300 group-hover:text-pink-400" />
                            </div>
                         )}
                     </div>
                  </div>
                </div>

                {/* Updated Progress Bar with Ticks & Emojis */}
                <div className="relative w-full h-20 mt-8 mb-6"> 
                    <div className="w-full bg-slate-100 h-6 rounded-full overflow-hidden shadow-inner relative z-10">
                    <div 
                        className="h-full bg-gradient-to-r from-yellow-400 to-orange-500 transition-all duration-700 ease-out flex items-center justify-end px-2"
                        style={{ width: `${progressPercentage}%` }}
                    >
                        {progressPercentage >= 100 && <span className="text-xs text-white font-bold animate-pulse">{t.goalReached}</span>}
                    </div>
                    </div>

                    {RANK_STEPS.map((step) => {
                        const position = step.points; 
                        const isReached = progressPercentage >= position;
                        
                        return (
                            <div 
                            key={step.key} 
                            className="absolute top-0 bottom-0 flex flex-col items-center pointer-events-none"
                            style={{ left: `${position}%`, transform: 'translateX(-50%)' }}
                            >
                            <div className={`h-6 w-0.5 z-20 absolute top-0 ${isReached ? 'bg-white/70' : 'bg-slate-300/50'}`}></div>
                            <div 
                                className={`mt-6 flex flex-col items-center transition-all duration-500 transform ${isReached ? 'opacity-100 scale-110 filter drop-shadow-sm' : 'opacity-40 grayscale scale-90'}`}
                            >
                                <div className="text-2xl md:text-3xl">{step.icon}</div>
                                <div className="text-[10px] md:text-xs font-bold text-slate-500 mt-1 whitespace-nowrap bg-white/80 px-1 rounded">{t.ranks[step.key]}</div>
                            </div>
                            </div>
                        );
                    })}
                </div>
              </div>

              {/* Add Student Form */}
              {showAddForm && (
                <div className="max-w-6xl mx-auto mb-8 bg-white p-6 rounded-2xl shadow-xl border-2 border-orange-300 animate-in fade-in slide-in-from-top-4 relative z-10 w-full">
                  <div className="flex justify-between items-center mb-4">
                      <h3 className="font-bold text-lg flex items-center gap-2"><UserPlus className="text-orange-500" size={20}/> {isBatchMode ? t.batchImportTitle : t.welcomeNew}</h3>
                      <div className="flex bg-slate-100 p-1 rounded-lg">
                          <button onClick={() => setIsBatchMode(false)} className={`px-3 py-1 rounded-md text-sm font-bold transition-all flex items-center gap-1 ${!isBatchMode ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><User size={14} /> {t.singleAdd}</button>
                          <button onClick={() => setIsBatchMode(true)} className={`px-3 py-1 rounded-md text-sm font-bold transition-all flex items-center gap-1 ${isBatchMode ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}><FileText size={14} /> {t.batchImport}</button>
                      </div>
                  </div>
                  {isBatchMode ? (
                      <form onSubmit={handleBatchImport} className="space-y-4">
                           <div>
                            <label className="block text-sm font-medium text-slate-600 mb-1">{t.batchLabel}</label>
                            <textarea value={batchNames} onChange={(e) => setBatchNames(e.target.value)} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-orange-400 focus:outline-none text-lg h-32 leading-relaxed" placeholder={t.batchPlaceholder} autoFocus />
                            <p className="text-xs text-slate-400 mt-2 flex items-center gap-1"><Zap size={12} className="text-yellow-500"/> {t.batchNote}</p>
                          </div>
                           <div className="flex gap-3 pt-2">
                            <button type="submit" className="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 shadow-md transition-colors flex items-center justify-center gap-2"><Save size={18} /> {t.startImport}</button>
                            <button type="button" onClick={() => setShowAddForm(false)} className="px-6 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">{t.cancel}</button>
                          </div>
                      </form>
                  ) : (
                    <form onSubmit={handleAddStudent} className="space-y-4">
                      <div><label className="block text-sm font-medium text-slate-600 mb-1">{t.nameLabel}</label><input type="text" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-orange-400 focus:outline-none text-lg" placeholder={t.namePlaceholder} autoFocus /></div>
                      <div>
                        <label className="block text-sm font-medium text-slate-600 mb-2">{t.selectAvatar}</label>
                        <div className="flex flex-wrap gap-2 max-h-60 overflow-y-auto p-1">
                          {AVATARS.map((av) => (
                            <button key={av.name} type="button" onClick={() => setSelectedAvatar(av.icon)} className={`text-3xl p-3 rounded-xl transition-all transform hover:scale-110 ${selectedAvatar === av.icon ? 'bg-orange-100 ring-2 ring-orange-400 scale-110 shadow-sm' : 'bg-slate-50 hover:bg-slate-100'}`} title={av.name}>{av.icon}</button>
                          ))}
                        </div>
                      </div>
                      <div className="flex gap-3 pt-2">
                        <button type="submit" className="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 shadow-md transition-colors">{t.joinClass}</button>
                        <button type="button" onClick={() => setShowAddForm(false)} className="px-6 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">{t.cancel}</button>
                      </div>
                    </form>
                  )}
                </div>
              )}

              {/* Student Grid */}
              <div className="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 pb-20 relative z-10 w-full flex-grow content-start">
                {students.map((student) => (
                  <StudentCard 
                    key={student.id} 
                    student={student} 
                    attendanceData={attendanceRecord[currentWeek]?.[student.id]} 
                    onUpdatePoints={updatePoints} 
                    onDelete={handleDeleteStudent} 
                    onEdit={setEditingStudent} 
                    onView={setViewingStudent} 
                    isMuted={isMuted} 
                    lang={lang} 
                  />
                ))}
                {students.length === 0 && (
                  <div className="col-span-full text-center py-20 text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl"><p className="text-lg mb-2">{t.noStudents}</p><p>{t.startClick}</p></div>
                )}
              </div>

               <footer className="w-full text-center py-4 text-slate-400 text-sm font-medium relative z-10 mt-auto">{t.designBy}</footer>
            </div>
          );
        }

        const EditModal = ({ student, onClose, onSave, lang }) => {
            const [name, setName] = useState(student.name);
            const [avatar, setAvatar] = useState(student.avatar);
            const t = TRANSLATIONS[lang];
            const handleSubmit = (e) => { e.preventDefault(); onSave({ ...student, name, avatar }); };

            return (
                <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-orange-50"><h3 className="font-bold text-lg text-orange-700 flex items-center gap-2"><Pencil size={20} /> {t.editStudent}</h3><button onClick={onClose} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-200 transition-colors"><X size={24} /></button></div>
                        <form onSubmit={handleSubmit} className="p-6 overflow-y-auto">
                            <div className="mb-6"><label className="block text-sm font-bold text-slate-600 mb-2">{t.nameLabel}</label><input type="text" value={name} onChange={(e) => setName(e.target.value)} className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-orange-400 focus:outline-none text-lg font-bold text-slate-700" autoFocus /></div>
                            <div className="mb-6"><label className="block text-sm font-bold text-slate-600 mb-2">{t.changeAvatar}</label><div className="grid grid-cols-6 gap-2 sm:gap-3">{AVATARS.map((av) => (<button key={av.name} type="button" onClick={() => setAvatar(av.icon)} className={`text-2xl sm:text-3xl p-2 rounded-xl transition-all ${avatar === av.icon ? 'bg-orange-100 ring-2 ring-orange-400 shadow-md scale-110' : 'bg-slate-50 hover:bg-slate-100 hover:scale-105'}`} title={av.name}>{av.icon}</button>))}</div></div>
                            <div className="flex gap-3"><button type="submit" className="flex-1 bg-orange-500 text-white py-3 rounded-xl font-bold hover:bg-orange-600 shadow-md transition-colors flex justify-center items-center gap-2"><Save size={20} /> {t.saveChanges}</button><button type="button" onClick={onClose} className="px-6 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">{t.cancel}</button></div>
                        </form>
                    </div>
                </div>
            );
        };

        // 將 React 應用程式掛載到網頁中
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
